product:
  name: "Skorin"
  tagline: "Simulasi CAT SKD CPNS — Gratis, Format Asli, Skor Instan"
  
  description: >
    Skorin adalah platform simulasi try out CAT gratis untuk persiapan SKD CPNS 
    dan TKD BUMN. Dengan format ujian asli (110 soal, 100 menit), penilaian otomatis 
    per section (TWK/TIU/TKP), dan pembahasan lengkap setiap soal. Soal dikurasi 
    dengan AI dan divalidasi untuk menyerupai kualitas ujian sebenarnya. 
    Tanpa biaya, tanpa batasan sesi.

  value_proposition:
    primary: "Latihan SKD dengan format dan tekanan ujian asli — gratis"
    secondary:
      - "Tahu kelemahan per section, bukan cuma skor total"
      - "Soal bervariasi setiap try out, tidak repetitif"
      - "Rasakan simulasi CBT tanpa harus bayar mahal"

  pain_points_addressed:
    - problem: "Latihan soal acak dan tidak terstruktur"
      solution: "Try out terjadwal dengan format ujian resmi (110 soal, 100 menit)"
    - problem: "Sulit mencari simulasi CBT yang realistis dan terjangkau"
      solution: "Simulasi gratis dengan tampilan dan mekanisme mirip CAT BKN"
    - problem: "Tidak tahu harus lulus per section atau total"
      solution: "Skor otomatis per TWK/TIU/TKP dengan passing grade masing-masing"
    - problem: "Soal latihan yang sama terus, tidak menantang"
      solution: "Soal dikurasi AI, selalu bervariasi setiap sesi"

  key_features:
    - title: "Format Ujian Asli"
      description: "110 soal, 100 menit — sama persis dengan SKD CPNS sesungguhnya"
    - title: "Skor Per Section"
      description: "Penilaian otomatis TWK, TIU (Verbal/Numerik/Logis), dan TKP dengan passing grade resmi"
    - title: "Pembahasan Lengkap"
      description: "Setiap soal dilengkapi pembahasan detail setelah try out selesai"
    - title: "Try Out Terjadwal"
      description: "Event try out rutin untuk simulasi tekanan ujian nyata"
    - title: "Gratis Tanpa Batas"
      description: "Tidak ada biaya, tidak ada batasan jumlah sesi try out"
    - title: "Soal Berkualitas AI"
      description: "Soal di-generate dan divalidasi dengan AI untuk kualitas konsisten"

  exam_structure:
    type: "SKD CPNS"
    total_questions: 110
    duration_minutes: 100
    sections:
      - key: "TWK"
        name: "Tes Wawasan Kebangsaan"
        questions: 30
        passing_grade: 65
      - key: "TIU"
        name: "Tes Intelegensia Umum"
        questions: 35
        subsections: ["Verbal (12)", "Numerik (12)", "Logis (11)"]
        passing_grade: 80
      - key: "TKP"
        name: "Tes Karakteristik Pribadi"
        questions: 45
        passing_grade: 166
    pass_condition: "Harus lulus passing grade di SEMUA section (TWK, TIU, TKP)"

  tone_of_voice:
    style: "friendly, informatif, semangat, supportif, realistis, tapi juga jenaka dengan senang menyelipkan jokes yang disenangi oleh Gen Z"
    do:
      - "Gunakan bahasa yang relate dengan perjuangan calon ASN"
      - "Berikan motivasi tanpa janji berlebihan"
      - "Jelaskan fitur dengan konkret dan jujur"
      - "Acknowledge tantangan ujian SKD"
      - "Sesekali gunakan jokes untuk menarik perhatian"
    dont:
      - "Jangan klaim 'pasti lolos' atau garansi kelulusan"
      - "Jangan gunakan hype tanpa substansi"
      - "Jangan meremehkan kompetitor secara langsung"

  target_audience:
    primary: "Calon peserta CPNS yang serius mempersiapkan SKD"
    segments:
